[api]
; Cloud API endpoint. Default is OpenAI-compatible. Change to Groq or another provider if needed.
; OpenAI:  https://api.openai.com/v1/chat/completions
; Groq:    https://api.groq.com/openai/v1/chat/completions
endpoint="https://api.groq.com/openai/v1/chat/completions"

; The model to use for cloud inference.
; OpenAI examples: "gpt-4o-mini", "gpt-4o"
; Groq examples:   "llama-3.1-8b-instant", "llama3-70b-8192"
model="llama-3.1-8b-instant"

; API keys are NOT stored here. See config/secrets.cfg (gitignored).
