[local_server]
; Local llama-server endpoint (OpenAI-compatible API served by llama.cpp)
endpoint="http://127.0.0.1:8080/v1/chat/completions"

; Health-check endpoint to verify the server is ready before sending requests
health_check_url="http://127.0.0.1:8080/health"

; Maximum seconds to wait for the server to become ready after launch
health_check_timeout_sec=60

; Seconds between each health-check ping
health_check_interval_sec=2

[llama_flags]
; Context window size in tokens. 2048 is safe for < 4GB RAM. (RNF03)
ctx_size=2048

; Number of CPU threads. Set to the number of physical cores on your machine.
threads=4

; Number of layers to offload to GPU. 0 = CPU only.
; 99 = offload all layers to GPU (recommended if VRAM >= 4GB).
; RTX 4060 (8GB VRAM) + Llama-3.2-3B-Q4_K_M (~2GB) = pot carregar tot a GPU.
n_gpu_layers=-1

; Host and port where llama-server will listen.
host="127.0.0.1"
port=8080

[model]
; Direct download URL for the .GGUF model file (HuggingFace or similar CDN)
; Replace with the actual URL for the model you want to use.
; Recommended: a quantized model under 4GB (e.g. Q4_K_M quantization)
download_url="https://huggingface.co/bartowski/Llama-3.2-3B-Instruct-GGUF/resolve/main/Llama-3.2-3B-Instruct-Q4_K_M.gguf"

; Path where the downloaded model will be saved (inside Godot's user data folder)
local_path="user://models/model.gguf"
